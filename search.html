---
layout: default
title: Search
permalink: /search/
---

<header class="page-hero">
  <p class="signal-kicker"><span aria-hidden="true"></span> Find something you’ll enjoy</p>
  <h1 class="page-title">Search</h1>
  <p class="page-copy">Find episodes, events, videos, and updates.</p>
</header>

<section class="panel section search-panel">
  <h2 class="section-title">Search the archive</h2>
  <label class="sr-only" for="searchBox">Search titles and notes</label>
  <input id="searchBox" class="input" type="search" placeholder="Search titles and notes…" autocomplete="off">

  <div id="filters" class="archive-filters" aria-label="Filter search results">
    <button class="filter-btn" data-filter="all" type="button">All</button>
    <button class="filter-btn" data-filter="episode" type="button">Episodes</button>
    <button class="filter-btn" data-filter="event" type="button">Events</button>
    <button class="filter-btn" data-filter="youtube" type="button">YouTube</button>
    <button class="filter-btn" data-filter="post" type="button">Posts</button>
  </div>

  <div id="searchMeta" class="meta"></div>
  <div id="results"></div>
</section>

<script>
  window.__POSTS__ = [
    {% for post in site.posts %}
      {
        "title": {{ post.title | jsonify }},
        "url": {{ post.url | prepend: site.baseurl | jsonify }},
        "date": {{ post.date | date: "%b %d, %Y" | jsonify }},
        "type": {{ post.content_type | default: "post" | jsonify }},
        "excerpt": {{ post.excerpt | default: post.content | strip_html | strip_newlines | truncate: 220 | jsonify }},
        "content": {{ post.content | strip_html | strip_newlines | jsonify }}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
</script>
<script src="{{ site.baseurl }}/assets/js/search.js"></script>
