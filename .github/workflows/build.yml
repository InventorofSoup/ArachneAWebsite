name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  jekyll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Validate content manager configuration
        run: ruby -e "require 'yaml'; YAML.safe_load_file('admin/config.yml', aliases: true)"

      - name: Build site
        run: bundle exec jekyll build --strict_front_matter
