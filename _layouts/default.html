<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title | default: "Arachne" }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}">

  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">

  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/og-image.png">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | escape }}{% else %}{{ site.description | escape }}{% endif %}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }} Feed" href="{{ '/feed.xml' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oxanium:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/icons/Favicon.png">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/icons/Favicon.png">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="signal-bar" aria-hidden="true"></div>
  <div class="shell">
    {% include sidebar.html %}

    <main class="main container" id="main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>ARACHNE · EST. 2023</span>
      <span>GAMES · STORIES · COMMUNITY</span>
    </footer>
  </div>

  <script>
    (function () {
      function normalizePath(path) {
        if (!path) return "/";

        path = path.split("?")[0].split("#")[0];

        if (path.indexOf("index.html") !== -1) {
          path = path.replace(/index\.html$/, "");
        }

        if (path.length > 1 && path.endsWith("/")) {
          path = path.slice(0, -1);
        }

        return path || "/";
      }

      var base = "{{ site.baseurl }}" || "";
      var currentPath = normalizePath(window.location.pathname);

      document.querySelectorAll(".nav a[data-path]").forEach(function (link) {
        var dataPath = link.getAttribute("data-path") || "/";
        var fullPath = normalizePath(base + dataPath);

        if (currentPath === fullPath) {
          link.classList.add("active");
          link.setAttribute("aria-current", "page");
        }
      });

      document.addEventListener("click", function (event) {
        document.querySelectorAll(".more-menu[open]").forEach(function (menu) {
          if (!menu.contains(event.target)) menu.removeAttribute("open");
        });
      });
    })();
  </script>
</body>
</html>
